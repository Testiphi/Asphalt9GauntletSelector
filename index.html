<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>狂野飙车9 · 擂台选车助手 · 最佳方案精选</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #0b0f17;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 1280px;
            width: 100%;
            background: #111827;
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid #2a3650;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        h1 {
            color: #f7d44a;
            font-size: 1.9rem;
            margin: 0 0 6px 0;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #9aa9ce;
            margin-bottom: 28px;
            border-left: 4px solid #e6b422;
            padding-left: 18px;
            font-size: 0.9rem;
            font-weight: 400;
        }
        .map-rows {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .map-row {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #0f1624;
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid #2a3857;
            backdrop-filter: blur(2px);
        }
        .map-index {
            width: 36px; height: 36px;
            background: #1f2a44;
            color: #ffde9c;
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px #00000030, 0 1px 0 #3a4870;
        }
        .map-select-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            flex: 1;
        }
        .select-wrapper {
            flex: 1 1 210px;
            min-width: 170px;
        }
        .select-wrapper label {
            display: block;
            font-size: 0.7rem;
            color: #8f9ec7;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        select {
            width: 100%;
            padding: 10px 14px;
            background: #030617;
            border: 1px solid #3a4880;
            color: #f0f4ff;
            border-radius: 34px;
            font-size: 0.88rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2393a5df' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 14px;
            transition: 0.1s;
        }
        select:focus {
            border-color: #f5c542;
            outline: none;
        }
        select:disabled {
            opacity: 0.6;
            cursor: default;
        }
        .garage {
            background: #0e1627;
            border-radius: 32px;
            padding: 18px 20px;
            margin: 18px 0 24px;
            border: 1px solid #29385c;
        }
        .garage-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .garage-header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #dbe4ff;
        }
        .garage-actions {
            display: flex;
            gap: 12px;
        }
        .garage-btn {
            background: #202a42;
            border: 1px solid #4f639a;
            color: #f2e9c7;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .garage-btn:hover {
            background: #2f3e66;
            border-color: #f5c542;
            color: #fff2cf;
        }
        .car-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 270px;
            overflow-y: auto;
            padding: 8px 6px;
            background: #070c18;
            border-radius: 34px;
            border: 1px solid #253153;
        }
        .car-tag {
            background: #18203a;
            color: #cbd9ff;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #40548b;
            cursor: pointer;
            transition: 0.08s linear;
            user-select: none;
        }
        .car-tag.selected {
            background: #f3bc3c;
            color: #0e1422;
            border-color: #ffdf8c;
            font-weight: 700;
            box-shadow: 0 0 6px #f5bc3c;
        }
        .action {
            text-align: center;
            margin: 18px 0 24px;
        }
        .recommend-btn {
            background: linear-gradient(115deg, #f0b429, #cf951e);
            border: none;
            color: #0c1120;
            font-weight: bold;
            font-size: 1.35rem;
            padding: 14px 42px;
            border-radius: 70px;
            border-bottom: 3px solid #9b6f18;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }
        .recommend-btn:hover {
            background: linear-gradient(115deg, #ffcd5a, #e6a82a);
            transform: scale(0.98);
        }
        .result-panel {
            background: #0f1628;
            border-radius: 32px;
            padding: 20px 22px;
            border: 1px solid #2f3f6b;
        }
        .result-title {
            color: #cddcff;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .scheme-selector {
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .scheme-selector label {
            color: #bacaee;
            font-weight: 500;
        }
        .scheme-selector select {
            width: auto;
            min-width: 320px;
            background: #121b32;
            border-color: #536cac;
        }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 16px;
        }
        .result-item {
            background: #141e38;
            border-radius: 28px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid #2e4278;
            transition: 0.1s;
        }
        .result-map {
            font-weight: 700;
            color: #f2e4b3;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .result-bigmap {
            font-size: 0.7rem;
            color: #8b9ad4;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .result-car {
            background: #1f2c54;
            padding: 9px 0;
            border-radius: 60px;
            font-weight: 800;
            color: #f8df96;
            border: 1px solid #6b86c9;
            font-size: 0.95rem;
        }
        .result-car.empty {
            background: #182040;
            color: #7f8bbd;
            border: 1px dashed #5b6fa5;
            font-weight: 500;
        }
        .priority-badge {
            font-size: 0.65rem;
            background: #01040e60;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            color: #b7c5ff;
        }
        .footer-note {
            color: #596b9b;
            text-align: right;
            margin-top: 14px;
            font-size: 0.75rem;
        }
        @media (max-width: 700px) {
            .card { padding: 18px; }
            .map-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🏆 擂台选车 · 巅峰方案</h1>
    <div class="sub">⭐ 基于优先级字典序自动萃取最佳分配方案 | 每张图均采用“最优/次优”车且全局不重复</div>

    <div class="map-rows" id="mapRowsContainer"></div>

    <div class="garage">
        <div class="garage-header">
            <h2>🚘 我的车库（点亮拥有的车辆）</h2>
            <div class="garage-actions">
                <span class="garage-btn" id="selectAllBtn">✔ 全部点亮</span>
                <span class="garage-btn" id="clearAllBtn">✖ 全部清空</span>
            </div>
        </div>
        <div class="car-grid" id="carGrid"></div>
    </div>

    <div class="action">
        <button class="recommend-btn" id="recommendBtn">✨ 生成最佳方案（前5名） ✨</button>
    </div>

    <div class="result-panel">
        <div class="result-title">📌 最优分配方案库（按优先级排序）</div>
        <div class="scheme-selector">
            <label for="schemeSelect">🏅 选择方案：</label>
            <select id="schemeSelect"></select>
        </div>
        <div class="result-grid" id="resultGrid"></div>
        <div class="footer-note">🎯 方案按“五张图优先级向量”字典序排列（越靠前综合越优）｜ 同一辆车不会重复上场</div>
    </div>
</div>

<script>
(function() {
    // ----------------------------- 硬核车辆库（完整车库池）--------------------------------
    const USER_CARS = [
        "杰皇", "f5r", "r兔", "300+", "玻璃", "银电", "小蜥蜴", "恶魔", "大超", "莫斯勒", 
        "21c", "cc850", "f5", "风龙", "杰弟", "黑龙", "ssc", "c2", "猫头鹰", "白龙", 
        "杰哥", "ps龙", "肥龙", "att", "fp1", "urs", "统治", "divo", "法拉第", "速尾", "纳兰", 
        "秋王", "sf90", "cs", "自燃", "c1", "狼王", "塞纳", "电牛", "复仇", "小自燃", 
        "自私", "万达", "狼崽", "火山", "b95", "499p", "英灵殿", "t牛", "650s", "霓虹gtr", "007s", "9x8", "gtr50", "红秋王", "fe3", 
        "风扇", "r牛", "er9", "六子", "sgt", "600lt", "帕梅", "5n"
    ];

    // 全局数据
    let RACE_DATA = null;               
    let bigMapList = [];
    let smallMapsByBig = {};            

    // DOM 元素
    const mapRowsContainer = document.getElementById('mapRowsContainer');
    const carGrid = document.getElementById('carGrid');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const recommendBtn = document.getElementById('recommendBtn');
    const schemeSelect = document.getElementById('schemeSelect');
    const resultGrid = document.getElementById('resultGrid');

    const ROWS = 5;
    let bigSelects = [];
    let smallSelects = [];

    // 车库选中集合
    let selectedCars = new Set();

    // 当前最佳方案列表 (每个元素包含 { assignment, priorityVector })
    let currentBestSchemes = [];   

    // ---------- 辅助: 解析车组（例如 "狼崽/火山" -> ["狼崽","火山"]）----------
    function parseCarGroup(cell) {
        if (typeof cell === 'string' && cell.includes('/')) {
            return cell.split('/').map(s => s.trim());
        }
        return [cell];
    }

    // ---------- 构建地图索引 ----------
    function buildMapIndex() {
        if (!RACE_DATA || !RACE_DATA.擂台选车表) return;
        const bigSet = new Set();
        const map = {};
        RACE_DATA.擂台选车表.forEach(item => {
            const big = item.大地图;
            const small = item.小地图;
            const rawOrder = item.选车顺序;    // 原始顺序数组（可能含/）
            const orderGroups = rawOrder.map(cell => parseCarGroup(cell));
            bigSet.add(big);
            if (!map[big]) map[big] = [];
            map[big].push({ name: small, orderGroups });
        });
        bigMapList = Array.from(bigSet).sort();
        smallMapsByBig = map;
    }

    // 渲染5个地图行 (初始空白下拉)
    function renderMapRows() {
        mapRowsContainer.innerHTML = '';
        for (let i = 0; i < ROWS; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'map-row';
            rowDiv.innerHTML = `
                <div class="map-index">${i+1}</div>
                <div class="map-select-group">
                    <div class="select-wrapper">
                        <label>🏞️ 大地图</label>
                        <select class="big-map-select" data-index="${i}"></select>
                    </div>
                    <div class="select-wrapper">
                        <label>🗺️ 小地图</label>
                        <select class="small-map-select" data-index="${i}" disabled></select>
                    </div>
                </div>
            `;
            mapRowsContainer.appendChild(rowDiv);
            const bigSel = rowDiv.querySelector('.big-map-select');
            const smallSel = rowDiv.querySelector('.small-map-select');
            bigSelects[i] = bigSel;
            smallSelects[i] = smallSel;
        }
    }

    // 刷新大地图选项（互斥逻辑避免同一大地图重复）
    function refreshBigMaps() {
        const oldBigValues = bigSelects.map(sel => sel.value);
        const oldSmallValues = smallSelects.map(sel => sel.value);
        const currentSelectedBigs = oldBigValues.filter(v => v !== '');

        bigSelects.forEach((sel, idx) => {
            const oldVal = oldBigValues[idx];
            sel.innerHTML = '';
            const emptyOpt = document.createElement('option');
            emptyOpt.value = '';
            emptyOpt.textContent = '-- 选择大地图 --';
            sel.appendChild(emptyOpt);
            bigMapList.forEach(big => {
                const opt = document.createElement('option');
                opt.value = big;
                opt.textContent = big;
                const usedCount = currentSelectedBigs.filter(v => v === big).length;
                const isSelf = (oldVal === big);
                if (!isSelf && usedCount > 0) opt.disabled = true;
                sel.appendChild(opt);
            });
            if (oldVal && Array.from(sel.options).some(opt => opt.value === oldVal && !opt.disabled)) {
                sel.value = oldVal;
            } else {
                sel.value = '';
            }
        });

        bigSelects.forEach((sel, idx) => {
            const newBig = sel.value;
            const oldSmall = oldSmallValues[idx];
            updateSmallMapSelect(idx, newBig, oldSmall);
        });
    }

    // 更新小地图下拉
    function updateSmallMapSelect(index, bigMap, oldSmall) {
        const smallSel = smallSelects[index];
        smallSel.innerHTML = '';
        if (!bigMap || !smallMapsByBig[bigMap]) {
            smallSel.disabled = true;
            const opt = document.createElement('option');
            opt.textContent = '❌ 先选大地图';
            smallSel.appendChild(opt);
            return;
        }
        smallSel.disabled = false;
        const emptyOpt = document.createElement('option');
        emptyOpt.value = '';
        emptyOpt.textContent = '-- 选择小地图 --';
        smallSel.appendChild(emptyOpt);
        const smallList = smallMapsByBig[bigMap];
        smallList.forEach(sm => {
            const opt = document.createElement('option');
            opt.value = sm.name;
            opt.textContent = sm.name;
            smallSel.appendChild(opt);
        });
        if (oldSmall && smallList.some(sm => sm.name === oldSmall)) {
            smallSel.value = oldSmall;
        } else {
            smallSel.value = '';
        }
    }

    // ---------- 车库渲染 ----------
    function renderGarage() {
        carGrid.innerHTML = '';
        USER_CARS.forEach(car => {
            const span = document.createElement('span');
            span.className = 'car-tag' + (selectedCars.has(car) ? ' selected' : '');
            span.textContent = car;
            span.addEventListener('click', () => {
                if (selectedCars.has(car)) selectedCars.delete(car);
                else selectedCars.add(car);
                renderGarage();
            });
            carGrid.appendChild(span);
        });
    }

    function selectAll() { USER_CARS.forEach(c => selectedCars.add(c)); renderGarage(); }
    function clearAll() { selectedCars.clear(); renderGarage(); }

    // 获取地图原始推荐组(未过滤) 和 每个车的优先级映射
    function getOriginalGroups(big, small) {
        const list = smallMapsByBig[big];
        if (!list) return null;
        const found = list.find(item => item.name === small);
        return found ? found.orderGroups : null;
    }

    // 核心：生成最佳前N个方案（基于字典序优先级）
    // selections: 有效地图列表 [{ big, small }, ...] 长度 <=5
    // ownedSet: 已拥有车辆集合
    // maxSchemes: 最多保留方案数量
    function generateTopSchemes(validSelections, ownedSet, maxSchemes = 5) {
        const n = validSelections.length;
        if (n === 0) return [];

        // 1. 预计算每张图的信息：原始分组（用于优先级索引）、过滤后的候选组（只含拥有车）
        const mapsData = [];
        for (let i = 0; i < n; i++) {
            const { big, small } = validSelections[i];
            const originalGroups = getOriginalGroups(big, small);
            if (!originalGroups) return [];
            
            // 过滤候选: 每组只保留owned车辆
            const filteredGroups = originalGroups.map(group => group.filter(car => ownedSet.has(car)));
            // 同时构建 车->优先级索引 映射 (组索引)
            const carToPriority = new Map();
            for (let gIdx = 0; gIdx < originalGroups.length; gIdx++) {
                const group = originalGroups[gIdx];
                for (const car of group) {
                    if (!carToPriority.has(car)) {
                        carToPriority.set(car, gIdx);   // 第一次出现即最佳优先级
                    }
                }
            }
            mapsData.push({
                filteredGroups,
                carToPriority,
                originalGroupsCount: originalGroups.length
            });
        }

        // 2. 回溯构造所有可能分配，同时计算优先级向量
        const allComplete = [];  // 存 { assignment(长度为n的car数组), vector(优先级数组) }
        const usedCarsGlobal = new Set();
        const currentAssignment = new Array(n).fill(null);
        const currentVector = new Array(n).fill(99);

        function backtrack(idx) {
            if (idx === n) {
                // 生成完整方案，注意需要将有效地图映射回原长度5的展示需要，此处先存储针对有效索引的
                allComplete.push({
                    assignment: [...currentAssignment],
                    vector: [...currentVector]
                });
                return;
            }
            const { filteredGroups, carToPriority } = mapsData[idx];
            if (filteredGroups.length === 0) return; // 无任何候选组，剪枝
            
            for (let g = 0; g < filteredGroups.length; g++) {
                const group = filteredGroups[g];
                if (group.length === 0) continue;
                for (const car of group) {
                    if (!usedCarsGlobal.has(car)) {
                        const priority = carToPriority.get(car) ?? 99;
                        usedCarsGlobal.add(car);
                        currentAssignment[idx] = car;
                        currentVector[idx] = priority;
                        backtrack(idx + 1);
                        usedCarsGlobal.delete(car);
                        currentAssignment[idx] = null;
                        currentVector[idx] = 99;
                    }
                }
            }
        }

        backtrack(0);
        if (allComplete.length === 0) return [];

        // 3. 去重 & 字典序排序取前 maxSchemes 个
        // 去重依据: vector 字符串 + assignment 可以简单依据 vector 去重，但同向量不同车保留最佳之一（任意保留一个）
        const mapByVector = new Map();
        for (const item of allComplete) {
            const key = item.vector.join(',');
            if (!mapByVector.has(key)) {
                mapByVector.set(key, item);
            }
        }
        const uniqueSchemes = Array.from(mapByVector.values());
        
        // 字典序排序 (比较priority向量)
        uniqueSchemes.sort((a, b) => {
            for (let i = 0; i < n; i++) {
                if (a.vector[i] !== b.vector[i]) return a.vector[i] - b.vector[i];
            }
            return 0;
        });
        
        // 取前maxSchemes个
        const topRaw = uniqueSchemes.slice(0, maxSchemes);
        
        // 转换为最终结果：需要将assignment（长度n）扩展为总长度5的数组（无地图的位置为null）
        const finalSchemes = topRaw.map(scheme => {
            const fullAssignment = new Array(ROWS).fill(null);
            const fullVector = new Array(ROWS).fill(null);
            for (let i = 0; i < n; i++) {
                const originalIdx = validSelections[i].originalIndex; // 需要记录原始index
                fullAssignment[originalIdx] = scheme.assignment[i];
                fullVector[originalIdx] = scheme.vector[i];
            }
            return { assignment: fullAssignment, vector: fullVector };
        });
        
        return finalSchemes;
    }

    // 获取当前有效地图列表（带原始行索引）
    function getCurrentValidMaps() {
        const maps = [];
        for (let i = 0; i < ROWS; i++) {
            const big = bigSelects[i].value;
            const small = smallSelects[i].value;
            if (big && small) {
                maps.push({ big, small, originalIndex: i });
            }
        }
        return maps;
    }

    // 更新界面：生成最佳方案并渲染
    function computeAndDisplayBestSchemes() {
        const validMaps = getCurrentValidMaps();
        if (validMaps.length === 0) {
            currentBestSchemes = [];
            schemeSelect.innerHTML = '';
            const opt = document.createElement('option');
            opt.textContent = '⚠️ 请至少选择一张地图';
            opt.disabled = true;
            schemeSelect.appendChild(opt);
            schemeSelect.disabled = true;
            // 展示提示信息
            resultGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#8f9bcb;">未选择任何地图，请先选择大地图与小地图</div>`;
            return;
        }
        
        // 调用生成前5个最佳方案（最大5个）
        const topSchemes = generateTopSchemes(validMaps, selectedCars, 5);
        currentBestSchemes = topSchemes;
        
        // 填充下拉菜单
        schemeSelect.innerHTML = '';
        if (currentBestSchemes.length === 0) {
            const option = document.createElement('option');
            option.textContent = '😭 无可分配方案（车库缺少必要车辆或车辆冲突）';
            option.value = '-1';
            schemeSelect.appendChild(option);
            schemeSelect.disabled = true;
            renderResultGrid(null, validMaps);
            return;
        }
        
        schemeSelect.disabled = false;
        currentBestSchemes.forEach((scheme, idx) => {
            // 制作摘要：展示每个图的车名和优先级数值
            const parts = [];
            for (let i = 0; i < ROWS; i++) {
                if (bigSelects[i].value && smallSelects[i].value) {
                    const car = scheme.assignment[i] || '?';
                    const prio = scheme.vector[i] !== null ? scheme.vector[i] : '—';
                    parts.push(`${i+1}:${car}(${prio})`);
                }
            }
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = `🏆 方案${idx+1} · 向量[${scheme.vector.filter(v=>v!==null).join(',')}]  | ${parts.join(' ')}`;
            schemeSelect.appendChild(option);
        });
        schemeSelect.value = 0;
        renderResultGrid(currentBestSchemes[0], validMaps);
    }
    
    // 渲染指定方案到结果网格 (传入完整方案对象及有效地图上下文)
    function renderResultGrid(scheme, validMapsContext = null) {
        if (!scheme) {
            // 无方案展示占位
            let html = '';
            for (let i = 0; i < ROWS; i++) {
                const big = bigSelects[i]?.value;
                const small = smallSelects[i]?.value;
                if (big && small) {
                    html += `<div class="result-item"><div class="result-map">${small}</div><div class="result-bigmap">${big}</div><div class="result-car empty">🚫 无法分配</div></div>`;
                } else if (bigSelects[i]?.value || smallSelects[i]?.value) {
                    html += `<div class="result-item"><div class="result-map">未选完整</div><div class="result-bigmap">--</div><div class="result-car empty">⛔ 缺地图</div></div>`;
                } else {
                    html += `<div class="result-item"><div class="result-map">第${i+1}图</div><div class="result-bigmap">未选</div><div class="result-car empty">⚡ 待选图</div></div>`;
                }
            }
            resultGrid.innerHTML = html;
            return;
        }
        
        let html = '';
        for (let i = 0; i < ROWS; i++) {
            const big = bigSelects[i].value;
            const small = smallSelects[i].value;
            if (big && small) {
                const car = scheme.assignment[i];
                const priorityVal = scheme.vector[i];
                if (car) {
                    html += `<div class="result-item">
                        <div class="result-map">${small}</div>
                        <div class="result-bigmap">${big}</div>
                        <div class="result-car">🏎️ ${car}</div>
                        <div class="priority-badge">⭐ 优先级 ${priorityVal}</div>
                    </div>`;
                } else {
                    html += `<div class="result-item">
                        <div class="result-map">${small}</div>
                        <div class="result-bigmap">${big}</div>
                        <div class="result-car empty">❌ 无可用车</div>
                    </div>`;
                }
            } else {
                html += `<div class="result-item">
                    <div class="result-map">第${i+1}位</div>
                    <div class="result-bigmap">未选地图</div>
                    <div class="result-car empty">⛔ 未配置</div>
                </div>`;
            }
        }
        resultGrid.innerHTML = html;
    }
    
    // 监听方案下拉变化
    function bindSchemeChange() {
        schemeSelect.addEventListener('change', (e) => {
            const idx = parseInt(e.target.value, 10);
            if (!isNaN(idx) && idx >= 0 && idx < currentBestSchemes.length) {
                renderResultGrid(currentBestSchemes[idx], null);
            }
        });
    }
    
    // 全量刷新 (地图修改后重新计算)
    function refreshAll() {
        refreshBigMaps();          // 更新下拉互斥
        computeAndDisplayBestSchemes(); 
    }
    
    // 绑定监听地图变更 + 按钮
    function bindEvents() {
        bigSelects.forEach(sel => sel.addEventListener('change', refreshAll));
        // 小地图变化也触发重新计算
        smallSelects.forEach(sel => sel.addEventListener('change', refreshAll));
        recommendBtn.addEventListener('click', () => {
            computeAndDisplayBestSchemes();
        });
        selectAllBtn.addEventListener('click', () => { selectAll(); computeAndDisplayBestSchemes(); });
        clearAllBtn.addEventListener('click', () => { clearAll(); computeAndDisplayBestSchemes(); });
        bindSchemeChange();
    }
    
    // 初始化：加载数据
    async function initApp() {
        try {
            const response = await fetch('data.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            RACE_DATA = await response.json();
            buildMapIndex();
            renderMapRows();
            renderGarage();
            refreshBigMaps();      // 初始填充大地图选项
            bindEvents();
            computeAndDisplayBestSchemes();
        } catch (err) {
            mapRowsContainer.innerHTML = `<div class="loading" style="color:#f99;padding:30px;">❌ 加载失败: ${err.message}<br>请确保 data.json 文件存在且格式正确</div>`;
            console.error(err);
        }
    }
    
    initApp();
})();
</script>
</body>
</html>
